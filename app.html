<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBTECH — Control Bovino</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐄</text></svg>">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

  <div id="auth-guard" style="position:fixed;inset:0;background:#0d1f12;z-index:9999;display:flex;align-items:center;justify-content:center">
    <div style="text-align:center;color:rgba(255,255,255,.6)">
      <div style="font-size:2.5rem;margin-bottom:12px">🐄</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.1em;color:#fff;margin-bottom:6px">BBTECH</div>
      <div style="font-size:.8rem;letter-spacing:.1em;text-transform:uppercase">Cargando...</div>
    </div>
  </div>

  <div id="app">
    <div id="sidebar-overlay"></div>
    <aside id="sidebar" role="navigation">
      <div class="sidebar-brand">
        <div class="sidebar-logo">
          <img src="assets/logo.png" alt="BBTECH" class="sidebar-logo-img"
               onerror="this.style.display='none';document.getElementById('sb-logo-fallback').style.display='flex'">
          <div id="sb-logo-fallback" style="display:none;align-items:center;gap:8px">
            <div class="sidebar-logo-icon">🐄</div>
            <span>BBTECH</span>
          </div>
        </div>
        <div class="sidebar-tagline">Control Bovino</div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" title="Click para Administración" style="cursor:pointer">
          <div class="sidebar-avatar" id="topbar-avatar">A</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="topbar-username">Usuario</div>
            <div class="sidebar-user-role">Administrador ⚙</div>
          </div>
          <button class="sidebar-logout-btn" id="logout-btn" title="Cerrar sesión">⏻</button>
        </div>
      </div>
    </aside>
    <div id="main">
      <header id="topbar" role="banner">
        <button class="mobile-menu-btn btn btn-ghost btn-icon" id="mobile-menu-btn">☰</button>
        <nav class="topbar-breadcrumb" id="topbar-breadcrumb"><span class="bc-current">BBTECH</span></nav>
        <div class="topbar-actions">
          <span style="font-size:.75rem;color:var(--text-muted);font-family:var(--font-mono)">v2.0</span>
        </div>
      </header>
      <main id="main-content" role="main"></main>
    </div>
  </div>

  <!-- Scripts en orden de dependencia -->
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ciclo-view.js"></script>
  <script src="js/admin-view.js"></script>
  <script src="js/historial-view.js"></script>
  <script src="js/app.js"></script>

  <script>
    (function () {
      if (!BBT.Auth.isLoggedIn()) { window.location.replace('index.html'); return; }
      document.addEventListener('DOMContentLoaded', function () {
        var g = document.getElementById('auth-guard');
        if (g) { g.style.transition='opacity 300ms'; g.style.opacity='0'; setTimeout(function(){g.remove();},320); }
      });
    })();
  </script>
</body>
</html>
